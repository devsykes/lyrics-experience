<body>
    <!-- layer 1: what user will see when opening -->
    <div id="intro-overlay">
      <div class="intro-content">
        <button id="start-btn">
          <i class="fa-solid fa-play"></i>
        </button>
        <p class="warning-text">Use headphones for the best experience</p>
      </div>
    </div>

    <!-- Layer 2: what user will see next, the experience -->
    <main id="main-content">
    
        <section id="player">
            <img src="assets/cover.jpg" alt="Sanity Cover" class="album-art">
            
            <div class="track-info">
                <h1>Sanity</h1>
                <p>Louis Tomlinson</p>
            </div>

            <!-- Hidden audio player -->
            <audio id="audio-player">
                <source src="Assets/Sanity.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <!-- Control button for later -->
            <button id="main-play-pause">
                <i class="fa-solid fa-pause"></i>
            </button>
        </section>

        <section id="lyrics-wrapper">
            <div id="lyrics-container">
                <!-- JavaScript will fill it later w/ lyrics -->
            </div>
        </section>

    </main>
  </body>
</html>
